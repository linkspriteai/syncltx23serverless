name: Build Runpod Sync H200 Image

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner}/ltx23-sync:${GITHUB_SHA}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${owner}/ltx23-sync:latest" >> "$GITHUB_OUTPUT"
          echo "sync_h200=ghcr.io/${owner}/ltx23-sync:sync-h200" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./ltx23-standalone-service
          file: ./ltx23-standalone-service/infra/docker/Dockerfile.serverless
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}
            ${{ steps.meta.outputs.sync_h200 }}

      - name: Summary
        run: |
          echo "Built image tags:"
          echo " - ${{ steps.meta.outputs.image }}"
          echo " - ${{ steps.meta.outputs.latest }}"
          echo " - ${{ steps.meta.outputs.sync_h200 }}"
